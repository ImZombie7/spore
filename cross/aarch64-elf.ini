[binaries]
c       = ['clang', '--target=aarch64-none-elf']
ar      = 'llvm-ar'
strip   = 'llvm-strip'
objcopy = 'llvm-objcopy'

[built-in options]
c_link_args = ['-fuse-ld=lld', '-nostdlib', '-static',
               '-Wl,-z,max-page-size=0x1000', '-T', '../kernel/linker.ld']

[host_machine]
system     = 'none'
cpu_family = 'aarch64'
cpu        = 'aarch64'
endian     = 'little'
